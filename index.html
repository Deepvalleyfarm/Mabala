<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="assets/logo_light.png" />
    <meta name="description" content="Mabala is Zambia's all-in-one farm management platform. Track crops, poultry, and livestock. Buy inputs from verified suppliers. Built for African farmers — works on any phone.">
    <title>Mabala — Farm Management Platform</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[Mabala SW] Registration success:', reg.scope))
            .catch(err => console.error('[Mabala SW] Registration failure:', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
